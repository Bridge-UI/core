name: Bug report
title: "[Bug]: "
description: Report unexpected behavior in a Bridge UI component or utility.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can so we can reproduce and fix the issue.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@bridge-ui/react"
        - "@bridge-ui/vue"
        - "@bridge-ui/core"
        - Multiple packages
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component or area
      description: Which component or area is affected? Choose "Other" if not listed.
      options:
        - Alert
        - Avatar
        - Badge
        - BridgeUIProvider
        - Button
        - Card
        - Checkbox
        - DialogAction
        - FormControl
        - FormField
        - Icon
        - Label
        - Link
        - List
        - Listbox
        - ListItem
        - ListSection
        - Menu
        - Modal
        - ModalAction
        - NumberField
        - PasswordField
        - Radio
        - Select
        - Snackbar
        - SnackbarAction
        - Switch
        - Textarea
        - TextField
        - Utils / shared types
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Bridge UI version
      description: The version of the affected package(s), e.g. `0.0.1-beta.2`.
      placeholder: 0.0.1-beta.2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Render `<Button variant="primary">` with ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (include error messages or screenshots if relevant).
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A code snippet, StackBlitz, or repository link that reproduces the issue.
      render: tsx
      placeholder: |
        import { Button } from "@bridge-ui/react/Components/Button";

        export function Example() {
          return <Button>Click me</Button>;
        }

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Framework version, browser, OS, and any other relevant context.
      placeholder: |
        - React 19 / Vue 3.5
        - Chrome 138 on Ubuntu 24.04
        - Tailwind CSS 4
    validations:
      required: true

  - type: checkboxes
    id: parity
    attributes:
      label: Framework parity
      description: If you checked both frameworks, does the bug occur in React and Vue?
      options:
        - label: I tested in React
        - label: I tested in Vue
        - label: The bug occurs in both React and Vue
        - label: I have not tested the other framework

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
