name: Bridge UI Release

on:
  push:
    tags:
      - "v*"

concurrency:
  cancel-in-progress: false
  group: release-${{ github.ref }}

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish packages to npm
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: release
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Invalid tag: $TAG"
            exit 1
          fi

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            NPM_TAG=latest
          elif [[ "$VERSION" =~ -beta(\.|$) ]]; then
            NPM_TAG=beta
          elif [[ "$VERSION" =~ -rc(\.|$) ]]; then
            NPM_TAG=rc
          elif [[ "$VERSION" =~ -alpha(\.|$) ]]; then
            NPM_TAG=alpha
          else
            NPM_TAG=next
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $TAG (npm dist-tag: $NPM_TAG)"

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Verify package versions
        run: |
          VERSION="${{ steps.release.outputs.value }}"

          for pkg in core react vue; do
            PKG_VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "packages/${pkg}/package.json version is ${PKG_VERSION}, expected ${VERSION}"
              exit 1
            fi
          done

          EXPECTED_PEER="^${VERSION}"
          REACT_PEER=$(node -p "require('./packages/react/package.json').peerDependencies['@bridge-ui/core']")
          VUE_PEER=$(node -p "require('./packages/vue/package.json').peerDependencies['@bridge-ui/core']")

          if [ "$REACT_PEER" != "$EXPECTED_PEER" ] || [ "$VUE_PEER" != "$EXPECTED_PEER" ]; then
            echo "peerDependencies.@bridge-ui/core must be ${EXPECTED_PEER} in react and vue"
            exit 1
          fi

      - run: npm run build
      - run: npm run test:run

      - name: Publish packages
        run: |
          NPM_TAG="${{ steps.release.outputs.npm_tag }}"
          npm publish -w @bridge-ui/core --tag "$NPM_TAG"
          npm publish -w @bridge-ui/react --tag "$NPM_TAG"
          npm publish -w @bridge-ui/vue --tag "$NPM_TAG"
